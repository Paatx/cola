<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Cola</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="dot">R</div>
        <h1>Reserpax Cola</h1>
        <p>Panel de gestión para el staff</p>
      </div>

      <form>
        <div class="form-group">
          <label class="label" for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="tu@restaurante.com" autofocus>
        </div>

        <div class="form-group">
          <label class="label" for="password">Contraseña</label>
          <input type="password" id="password" class="input" placeholder="••••••••">
        </div>
<a href="cola.html" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px; text-decoration: none;">
  Entrar
</a>
        

        <p class="hint" style="text-align: center; margin-top: 20px;">
          ¿Problemas para acceder? Contacta con el administrador de tu restaurante.
        </p>
      </form>
    </div>
  </div>
</body>
</html>
